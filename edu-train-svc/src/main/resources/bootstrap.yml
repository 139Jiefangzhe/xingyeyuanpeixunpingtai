server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: edu-train-svc
  flyway:
    enabled: true
    locations: classpath:db
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:nacos.edu-infra.svc.cluster.local:8848}
        namespace: ${NACOS_NAMESPACE:edu-prod}
        group: DEFAULT_GROUP
        metadata:
          version: "1.0.0"
          region: "beijing"
      config:
        server-addr: ${NACOS_SERVER_ADDR:nacos.edu-infra.svc.cluster.local:8848}
        namespace: ${NACOS_NAMESPACE:edu-prod}
        group: DEFAULT_GROUP
        file-extension: yml
        shared-configs:
          - data-id: shared-config.yml
            group: DEFAULT_GROUP
            refresh: true
        extension-configs:
          - data-id: edu-train-svc.yml
            group: DEFAULT_GROUP
            refresh: true

mybatis-plus:
  mapper-locations: classpath*:mapper/*.xml
